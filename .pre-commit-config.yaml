repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: bash -c '"${PYTHON:-.venv/bin/python}" -m ruff format --check .'
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: bash -c '"${PYTHON:-.venv/bin/python}" -m ruff check .'
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: >-
          bash -c 'PY="${PYTHON:-.venv/bin/python}";
          if "$PY" -c "import xdist" >/dev/null 2>&1;
          then "$PY" -m pytest -n "${CHECK_JOBS:-auto}" --durations="${PYTEST_DURATIONS:-10}";
          else "$PY" -m pytest --durations="${PYTEST_DURATIONS:-10}";
          fi'
        language: system
        pass_filenames: false
